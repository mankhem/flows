<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Trading Pro — Flow Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0c0f;--bg2:#111318;--bg3:#181c23;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8eaf0;--muted:#6b7280;--green:#22c55e;--gdim:rgba(34,197,94,0.12);--red:#ef4444;--rdim:rgba(239,68,68,0.12);--amber:#f59e0b;--adim:rgba(245,158,11,0.12);--blue:#60a5fa;--bdim:rgba(96,165,250,0.12);--accent:#7c3aed;--acdim:rgba(124,58,237,0.15);--mono:'IBM Plex Mono',monospace;--sans:'Syne',sans-serif;--r:6px}
[data-theme="light"]{--bg:#f5f6fa;--bg2:#fff;--bg3:#eef0f5;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#111318;--muted:#6b7280;--green:#16a34a;--gdim:rgba(22,163,74,0.1);--red:#dc2626;--rdim:rgba(220,38,38,0.1);--amber:#d97706;--adim:rgba(217,119,6,0.1);--blue:#2563eb;--bdim:rgba(37,99,235,0.1);--accent:#7c3aed;--acdim:rgba(124,58,237,0.1)}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;transition:background .2s,color .2s}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{width:340px;padding:40px 36px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:12px}
.login-logo{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-family:var(--sans)}
.login-title{font-size:22px;font-weight:700;margin-bottom:32px;font-family:var(--sans)}
.login-label{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.login-input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--mono);font-size:14px;padding:10px 14px;outline:none;transition:border-color .15s;margin-bottom:16px}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-family:var(--sans);font-size:14px;font-weight:500;padding:11px;cursor:pointer;transition:opacity .15s}
.login-btn:hover{opacity:.88}
.login-error{font-size:12px;color:var(--red);margin-top:10px;display:none}

/* LAYOUT */
#dashboard{display:none;height:100vh;flex-direction:column}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:48px;border-bottom:0.5px solid var(--border);flex-shrink:0;background:var(--bg)}
.hdr-l{display:flex;align-items:center;gap:12px}
.brand{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:var(--sans)}
.hdrsep{width:1px;height:14px;background:var(--border2)}
.hdr-sub{font-size:11px;color:var(--muted)}
.hdr-r{display:flex;align-items:center;gap:8px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--green);letter-spacing:.06em;text-transform:uppercase}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#clock{font-size:11px;color:var(--muted)}
.icon-btn{background:none;border:0.5px solid var(--border);border-radius:var(--r);color:var(--muted);padding:5px 8px;cursor:pointer;font-size:12px;transition:color .15s}
.icon-btn:hover{color:var(--text)}

/* SOURCE TABS */
.source-tabs{display:flex;gap:1px;background:var(--border);border-bottom:0.5px solid var(--border);flex-shrink:0}
.src-tab{flex:1;padding:10px 20px;font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;text-align:center;color:var(--muted);background:var(--bg);transition:all .15s;font-family:var(--sans);border:none;border-bottom:2px solid transparent}
.src-tab:hover{color:var(--text)}
.src-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.src-tab.active.v3{border-bottom-color:var(--amber)}
.src-tab .tab-count{font-size:10px;color:var(--muted);margin-left:6px;font-family:var(--mono)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border-bottom:0.5px solid var(--border);flex-shrink:0}
.stat{background:var(--bg);padding:10px 18px}
.sl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.sv{font-size:20px;font-weight:700;font-family:var(--sans)}
.sv.g{color:var(--green)}.sv.r{color:var(--red)}.sv.a{color:var(--amber)}

/* BODY */
.body-layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:185px;flex-shrink:0;border-right:0.5px solid var(--border);display:flex;flex-direction:column;background:var(--bg)}
.sb-search{padding:8px 10px;border-bottom:0.5px solid var(--border)}
.sb-search input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 8px;outline:none}
.sb-search input:focus{border-color:var(--accent)}
.sb-search input::placeholder{color:var(--muted)}
.sbhdr{padding:7px 12px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:0.5px solid var(--border)}
#ticker-list{overflow-y:auto;flex:1}
.ti{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;border-bottom:0.5px solid var(--border);border-left:2px solid transparent;transition:background .1s}
.ti:hover{background:var(--bg2)}
.ti.active{background:var(--acdim);border-left-color:var(--accent)}
.ti.active-all{background:var(--bg3);border-left-color:var(--muted)}
.tn{font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;font-family:var(--sans)}
.tdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tm{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.tc{font-size:9px;color:var(--muted)}
.tp{font-size:9px;color:var(--amber)}

/* PANEL */
.panel{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.panel-top{padding:14px 18px 0;flex-shrink:0}
.phdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.phdr-left{}
.ptitle{font-size:17px;font-weight:700;font-family:var(--sans)}
.psub{font-size:11px;color:var(--muted);margin-top:2px}
#last-refresh{font-size:10px;color:var(--muted);white-space:nowrap}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.chart-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px}
.chart-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.chart-wrap{height:70px;position:relative}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.pill{font-size:10px;padding:3px 10px;border-radius:99px;border:0.5px solid var(--border2);cursor:pointer;color:var(--muted);background:transparent;transition:all .15s;font-family:var(--mono)}
.pill:hover{color:var(--text)}
.pill.active{background:var(--acdim);color:#a78bfa;border-color:var(--accent)}
.pill.active.g{background:var(--gdim);color:var(--green);border-color:rgba(34,197,94,.4)}
.pill.active.r{background:var(--rdim);color:var(--red);border-color:rgba(239,68,68,.4)}
.pill.active.a{background:var(--adim);color:var(--amber);border-color:rgba(245,158,11,.4)}
.tsep{width:1px;height:16px;background:var(--border)}
.sort-sel{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--muted);font-family:var(--mono);font-size:10px;padding:3px 8px;outline:none;cursor:pointer}

/* VIEW TOGGLE */
.view-toggle{display:flex;background:var(--bg3);border-radius:var(--r);padding:2px;gap:2px;border:0.5px solid var(--border2)}
.vt-btn{font-size:10px;padding:4px 12px;border-radius:4px;border:none;cursor:pointer;font-family:var(--mono);background:transparent;color:var(--muted);transition:all .15s}
.vt-btn.active{background:var(--accent);color:#fff}

/* FLOWS AREA */
.flows-area{padding:0 18px 18px;flex:1}
.flows-list{display:flex;flex-direction:column;gap:5px}

/* TICKER GROUP */
.tg{margin-bottom:18px}
.tghdr{display:flex;align-items:center;gap:8px;padding-bottom:7px;margin-bottom:7px;border-bottom:0.5px solid var(--border)}
.tgn{font-size:15px;font-weight:700;font-family:var(--sans)}
.tgc{font-size:11px;color:var(--muted)}
.tgp{font-size:11px;color:var(--amber);margin-left:auto}

/* FLOW CARD (grouped view) */
.fc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);border-left:2px solid transparent;overflow:hidden;transition:border-color .1s}
.fc:hover{border-color:var(--border2)}
.fc.call{border-left-color:var(--green)}
.fc.put{border-left-color:var(--red)}
.fc.new-flash{animation:flash .8s ease-out}
@keyframes flash{0%{background:rgba(124,58,237,.25)}100%{background:var(--bg2)}}
.fc-main{display:grid;grid-template-columns:8px 1fr auto;gap:8px;align-items:center;padding:9px 12px;cursor:pointer}
.fdot{width:7px;height:7px;border-radius:50%}
.fdot.call{background:var(--green)}.fdot.put{background:var(--red)}
.ftop{display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.fct{font-size:11px;font-weight:700}
.fct.call{color:var(--green)}.fct.put{color:var(--red)}
.fdet{font-size:10px;color:var(--muted)}
.fsub{font-size:10px;color:var(--muted)}
.badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.b{font-size:9px;padding:1px 5px;border-radius:3px;text-transform:uppercase;font-weight:700}
.b-bull{background:var(--gdim);color:var(--green)}
.b-bear{background:var(--rdim);color:var(--red)}
.b-rep{background:var(--adim);color:var(--amber)}
.b-odte{background:var(--bdim);color:var(--blue)}
.b-dte{background:var(--adim);color:var(--amber)}
.b-v3{background:rgba(245,158,11,0.2);color:var(--amber)}
.fr{text-align:right;flex-shrink:0}
.fp{font-size:12px;font-weight:700;font-family:var(--sans)}
.fp.lg{color:var(--amber)}
.ftime{font-size:10px;color:var(--muted);margin-top:1px}
.expand-icon{font-size:10px;color:var(--muted);margin-left:4px;transition:transform .2s;display:inline-block}
.expand-icon.open{transform:rotate(180deg)}
.fc-detail{display:none;padding:10px 14px 12px;border-top:0.5px solid var(--border);background:var(--bg3)}
.fc-detail.open{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.d-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.d-val{font-size:12px;font-weight:500}

/* FEED VIEW */
.feed-table{width:100%;border-collapse:collapse}
.feed-table th{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:5px 8px;text-align:left;border-bottom:0.5px solid var(--border);white-space:nowrap;font-weight:500;cursor:pointer;user-select:none}
.feed-table th:hover{color:var(--text)}
.feed-table th.sort-asc::after{content:" ▲";color:var(--accent);font-size:8px}
.feed-table th.sort-desc::after{content:" ▼";color:var(--accent);font-size:8px}
.feed-table td{padding:7px 8px;border-bottom:0.5px solid var(--border);font-size:11px;vertical-align:middle}
.feed-row{cursor:pointer;transition:background .1s}
.feed-row:hover td{background:var(--bg2)}
.feed-row.new-flash td{animation:rowflash .8s ease-out}
@keyframes rowflash{0%{background:rgba(124,58,237,.2)}100%{background:transparent}}
.feed-ticker{font-weight:700;font-family:var(--sans);font-size:12px}
.feed-call{color:var(--green);font-weight:700}
.feed-put{color:var(--red);font-weight:700}
.feed-prem{font-weight:700;font-family:var(--sans)}
.feed-prem.lg{color:var(--amber)}
.feed-muted{color:var(--muted)}
.feed-badges{display:flex;gap:3px;flex-wrap:wrap}

/* TOAST */
#toast-container{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);padding:10px 14px;font-size:12px;animation:toastin .3s ease;min-width:200px}
.toast.call-toast{border-left:3px solid var(--green)}
.toast.put-toast{border-left:3px solid var(--red)}
.toast.v3-toast{border-left:3px solid var(--amber)}
@keyframes toastin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.toast-ticker{font-weight:700;font-size:13px;font-family:var(--sans)}
.toast-sub{color:var(--muted);font-size:11px;margin-top:2px}

.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Alpha Trading Pro</div>
    <div class="login-title">Flow Monitor</div>
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="pw-input" placeholder="Enter password" autocomplete="current-password">
    <button class="login-btn" id="login-btn">Access Dashboard</button>
    <div class="login-error" id="login-error">Incorrect password. Try again.</div>
  </div>
</div>

<div id="dashboard">
  <div class="hdr">
    <div class="hdr-l">
      <div class="brand">Alpha Trading Pro</div>
      <div class="hdrsep"></div>
      <div class="hdr-sub">Options Flow Monitor</div>
    </div>
    <div class="hdr-r">
      <div class="live-badge"><div class="ldot"></div>Live</div>
      <div id="clock">--:-- -- ET</div>
      <button class="icon-btn" id="theme-btn">☀</button>
      <button class="icon-btn" id="sound-btn">🔔</button>
      <button class="icon-btn" id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="source-tabs">
    <button class="src-tab active" data-source="all">All Flows <span class="tab-count" id="tab-count-all">0</span></button>
    <button class="src-tab" data-source="sweeps">Sweeps <span class="tab-count" id="tab-count-sweeps">0</span></button>
    <button class="src-tab v3" data-source="v3">⚡ Momentum Calls <span class="tab-count" id="tab-count-v3">0</span></button>
  </div>

  <div class="stats">
    <div class="stat"><div class="sl">Total Flows</div><div class="sv" id="s-total">—</div></div>
    <div class="stat"><div class="sl">Calls</div><div class="sv g" id="s-calls">—</div></div>
    <div class="stat"><div class="sl">Puts</div><div class="sv r" id="s-puts">—</div></div>
    <div class="stat"><div class="sl">Repeat Signals</div><div class="sv a" id="s-repeats">—</div></div>
    <div class="stat"><div class="sl">Total Premium</div><div class="sv" id="s-prem">—</div></div>
  </div>

  <div class="body-layout">
    <div class="sidebar">
      <div class="sb-search"><input type="text" id="ticker-search" placeholder="Search ticker..."></div>
      <div class="sbhdr">Tickers</div>
      <div id="ticker-list"></div>
    </div>

    <div class="panel">
      <div class="panel-top">
        <div class="phdr">
          <div class="phdr-left">
            <div class="ptitle" id="panel-title">All Flows</div>
            <div class="psub" id="panel-sub">Loading...</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div id="last-refresh">—</div>
            <div class="view-toggle">
              <button class="vt-btn active" id="vt-grouped">Grouped</button>
              <button class="vt-btn" id="vt-feed">Feed</button>
            </div>
          </div>
        </div>

        <div class="charts-row" id="charts-row">
          <div class="chart-card"><div class="chart-label">Premium over time</div><div class="chart-wrap"><canvas id="chart-timeline"></canvas></div></div>
          <div class="chart-card"><div class="chart-label">Call / Put ratio</div><div class="chart-wrap"><canvas id="chart-ratio"></canvas></div></div>
          <div class="chart-card"><div class="chart-label">Top flows by premium</div><div class="chart-wrap"><canvas id="chart-top"></canvas></div></div>
        </div>

        <div class="toolbar">
          <button class="pill active" data-filter="all">All</button>
          <button class="pill" data-filter="call">Calls</button>
          <button class="pill" data-filter="put">Puts</button>
          <button class="pill" data-filter="bullish">Bullish</button>
          <button class="pill" data-filter="bearish">Bearish</button>
          <button class="pill" data-filter="repeat">Repeats</button>
          <button class="pill" data-filter="odte">ODTE</button>
          <button class="pill" data-filter="shortterm">0-5 DTE</button>
          <div class="tsep"></div>
          <select class="sort-sel" id="sort-sel">
            <option value="time-desc">Newest first</option>
            <option value="prem-desc">Highest premium</option>
            <option value="prem-asc">Lowest premium</option>
            <option value="size-desc">Largest size</option>
          </select>
        </div>
      </div>
      <div class="flows-area"><div id="flows-container"></div></div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
const DASHBOARD_PASSWORD = "3125";
const WORKER_URL         = "https://noisy-haze-5ed6.thealphatradingpro.workers.dev";
const REFRESH_INTERVAL   = 30_000;
const SESSION_KEY        = "atp_flow_auth";

function isAuthed(){ return sessionStorage.getItem(SESSION_KEY)==="1"; }
function doLogin(pw){ if(pw===DASHBOARD_PASSWORD){ sessionStorage.setItem(SESSION_KEY,"1"); showDashboard(); return true; } return false; }
function logout(){ sessionStorage.removeItem(SESSION_KEY); location.reload(); }
document.getElementById("login-btn").addEventListener("click",()=>{ if(!doLogin(document.getElementById("pw-input").value)){ document.getElementById("login-error").style.display="block"; document.getElementById("pw-input").value=""; document.getElementById("pw-input").focus(); } });
document.getElementById("pw-input").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("login-btn").click(); });
document.getElementById("logout-btn").addEventListener("click",logout);
if(isAuthed()) showDashboard();

function updateClock(){ document.getElementById("clock").textContent=new Date().toLocaleTimeString("en-US",{timeZone:"America/New_York",hour:"2-digit",minute:"2-digit",second:"2-digit"})+" ET"; }
setInterval(updateClock,1000); updateClock();

let darkMode=true;
document.getElementById("theme-btn").addEventListener("click",()=>{ darkMode=!darkMode; document.documentElement.setAttribute("data-theme",darkMode?"dark":"light"); document.getElementById("theme-btn").textContent=darkMode?"☀":"🌙"; updateCharts(); });

let soundOn=true;
document.getElementById("sound-btn").addEventListener("click",()=>{ soundOn=!soundOn; document.getElementById("sound-btn").textContent=soundOn?"🔔":"🔕"; });
function playAlert(){ if(!soundOn) return; try{ const ctx=new(window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(); const g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.setValueAtTime(880,ctx.currentTime); o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.1); g.gain.setValueAtTime(0.3,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3); o.start(); o.stop(ctx.currentTime+0.3); }catch{} }

let allFlows=[], selectedTicker="ALL", activeFilter="all", sortMode="time-desc", activeSource="all", viewMode="grouped", knownIds=new Set();
let charts={timeline:null,ratio:null,top:null};

function parsePrem(v){ const r=String(v).replace(/[$,\s]/g,""); if(r.endsWith("B")) return parseFloat(r)*1e9; if(r.endsWith("M")) return parseFloat(r)*1e6; if(r.endsWith("K")) return parseFloat(r)*1e3; return parseFloat(r)||0; }
function fmtMoney(n){ if(n>=1e9) return `$${(n/1e9).toFixed(2)}B`; if(n>=1e6) return `$${(n/1e6).toFixed(2)}M`; if(n>=1e3) return `$${(n/1e3).toFixed(1)}K`; return `$${n.toFixed(0)}`; }
function isODTE(exp){ const t=new Date(),e=new Date(exp); return e.getFullYear()===t.getFullYear()&&e.getMonth()===t.getMonth()&&e.getDate()===t.getDate(); }
function getDTE(exp){ const t=new Date(); t.setHours(0,0,0,0); const e=new Date(exp); e.setHours(0,0,0,0); return Math.round((e-t)/(1000*60*60*24)); }
function makeKey(r){ return [r.ticker,r.expiry,r.strike,r.contract].join("|"); }
function makeFlowId(r){ return [r.ticker,r.expiry,r.strike,r.contract,r.time,r.size].join("|"); }
function buildRepeatMap(flows){ const m=new Map(); flows.forEach(f=>{const k=makeKey(f);m.set(k,(m.get(k)||0)+1);}); return m; }

function getSourceFlows(){
  if(activeSource==="sweeps") return allFlows.filter(f=>f.source!=="v3");
  if(activeSource==="v3")     return allFlows.filter(f=>f.source==="v3");
  return allFlows;
}

function applyFilter(flows,filter,rm){
  return flows.filter(f=>{
    if(filter==="call")      return f.contract==="CALL";
    if(filter==="put")       return f.contract==="PUT";
    if(filter==="bullish")   return f.sentiment==="BULLISH";
    if(filter==="bearish")   return f.sentiment==="BEARISH";
    if(filter==="repeat")    return (rm.get(makeKey(f))||1)>=2;
    if(filter==="odte")      return isODTE(f.expiry);
    if(filter==="shortterm") return getDTE(f.expiry)>=0 && getDTE(f.expiry)<=5;
    return true;
  });
}
function parseTime(t){ try{ return new Date("1970/01/01 "+t).getTime()||0; }catch{return 0;} }
function sortFlows(flows){ return [...flows].sort((a,b)=>{
  if(sortMode==="prem-desc")   return parsePrem(b.premium)-parsePrem(a.premium);
  if(sortMode==="prem-asc")    return parsePrem(a.premium)-parsePrem(b.premium);
  if(sortMode==="size-desc")   return (parseFloat(String(b.size).replace(/[^0-9.]/g,""))||0)-(parseFloat(String(a.size).replace(/[^0-9.]/g,""))||0);
  if(sortMode==="size-asc")    return (parseFloat(String(a.size).replace(/[^0-9.]/g,""))||0)-(parseFloat(String(b.size).replace(/[^0-9.]/g,""))||0);
  if(sortMode==="ticker-asc")  return a.ticker.localeCompare(b.ticker);
  if(sortMode==="ticker-desc") return b.ticker.localeCompare(a.ticker);
  if(sortMode==="time-asc")    return parseTime(a.time)-parseTime(b.time);
  return parseTime(b.time)-parseTime(a.time); // time-desc default
}); }

async function fetchFlows(){ try{ const r=await fetch(`${WORKER_URL}/flows`); if(!r.ok) throw r; return await r.json(); }catch{ return null; } }

function showToast(f){
  const t=document.createElement("div");
  const cls = f.source==="v3"?"v3-toast":f.contract==="CALL"?"call-toast":"put-toast";
  t.className=`toast ${cls}`;
  t.innerHTML=`<div class="toast-ticker">${f.source==="v3"?"⚡ ":""}${f.ticker} ${f.contract}</div><div class="toast-sub">${f.premium} · $${f.strike} · ${f.expiry}</div>`;
  document.getElementById("toast-container").appendChild(t);
  setTimeout(()=>t.remove(),4000);
}

function initCharts(){
  const opts={responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{display:false}}};
  charts.timeline=new Chart(document.getElementById("chart-timeline").getContext("2d"),{type:"line",data:{labels:[],datasets:[{data:[],borderColor:"#7c3aed",backgroundColor:"rgba(124,58,237,0.08)",borderWidth:1.5,pointRadius:0,fill:true,tension:.4}]},options:{...opts,scales:{x:{display:false},y:{display:false}}}});
  charts.ratio=new Chart(document.getElementById("chart-ratio").getContext("2d"),{type:"doughnut",data:{labels:["Calls","Puts"],datasets:[{data:[0,0],backgroundColor:["#22c55e","#ef4444"],borderWidth:0}]},options:{...opts,cutout:"68%",plugins:{legend:{display:true,position:"right",labels:{color:"#6b7280",font:{size:10},boxWidth:8,padding:4}}}}});
  charts.top=new Chart(document.getElementById("chart-top").getContext("2d"),{type:"bar",data:{labels:[],datasets:[{data:[],backgroundColor:"rgba(245,158,11,0.6)",borderRadius:3}]},options:{...opts,indexAxis:"y",scales:{x:{display:false},y:{ticks:{color:"#6b7280",font:{size:9}},grid:{display:false}}}}});
}

function updateCharts(){
  if(!charts.timeline||!charts.ratio||!charts.top) return;
  const base=selectedTicker==="ALL"?getSourceFlows():getSourceFlows().filter(f=>f.ticker===selectedTicker);
  const buckets=new Map();
  base.forEach(f=>{ const l=f.time?f.time.substring(0,5):"?"; buckets.set(l,(buckets.get(l)||0)+parsePrem(f.premium)); });
  const tLabels=[...buckets.keys()].sort();
  charts.timeline.data.labels=tLabels;
  charts.timeline.data.datasets[0].data=tLabels.map(l=>Math.round(buckets.get(l)/1000));
  charts.timeline.update("none");
  const calls=base.filter(f=>f.contract==="CALL").length, puts=base.filter(f=>f.contract==="PUT").length;
  charts.ratio.data.datasets[0].data=[calls,puts];
  charts.ratio.update("none");
  const top5=[...base].sort((a,b)=>parsePrem(b.premium)-parsePrem(a.premium)).slice(0,5);
  charts.top.data.labels=top5.map(f=>`${f.ticker} ${f.contract[0]}`);
  charts.top.data.datasets[0].data=top5.map(f=>Math.round(parsePrem(f.premium)/1000));
  charts.top.update("none");
}

document.getElementById("ticker-search").addEventListener("input",e=>{
  const q=e.target.value.toUpperCase();
  document.querySelectorAll(".ti[data-ticker]").forEach(el=>{ el.style.display=(el.dataset.ticker==="ALL"||el.dataset.ticker.includes(q))?"":"none"; });
});

function renderSidebar(){
  const src=getSourceFlows();
  const groups=new Map();
  src.forEach(f=>{ if(!groups.has(f.ticker)) groups.set(f.ticker,[]); groups.get(f.ticker).push(f); });
  const sorted=[...groups.entries()].sort((a,b)=>b[1].reduce((s,f)=>s+parsePrem(f.premium),0)-a[1].reduce((s,f)=>s+parsePrem(f.premium),0));
  const list=document.getElementById("ticker-list");
  list.innerHTML="";
  const allEl=document.createElement("div");
  allEl.className=`ti ${selectedTicker==="ALL"?"active-all":""}`;
  allEl.dataset.ticker="ALL";
  allEl.innerHTML=`<span class="tn" style="color:var(--muted)">All Tickers</span><div class="tm"><span class="tc">${src.length} flows</span></div>`;
  allEl.addEventListener("click",()=>{ selectedTicker="ALL"; renderAll(); });
  list.appendChild(allEl);
  sorted.forEach(([ticker,tflows])=>{
    const calls=tflows.filter(f=>f.contract==="CALL").length;
    const prem=tflows.reduce((s,f)=>s+parsePrem(f.premium),0);
    const color=calls>=tflows.length/2?"var(--green)":"var(--red)";
    const el=document.createElement("div");
    el.className=`ti ${selectedTicker===ticker?"active":""}`;
    el.dataset.ticker=ticker;
    el.innerHTML=`<span class="tn"><div class="tdot" style="background:${color}"></div>${ticker}</span><div class="tm"><span class="tc">${tflows.length} flows</span><span class="tp">${fmtMoney(prem)}</span></div>`;
    el.addEventListener("click",()=>{ selectedTicker=ticker; renderAll(); });
    list.appendChild(el);
  });
}

function flowBadges(f,rm){
  const rc=rm.get(makeKey(f))||1;
  const dte=getDTE(f.expiry);
  const bs=[];
  if(f.sentiment==="BULLISH") bs.push(`<span class="b b-bull">Bull</span>`);
  else bs.push(`<span class="b b-bear">Bear</span>`);
  if(rc>=2) bs.push(`<span class="b b-rep">×${rc}</span>`);
  if(dte===0) bs.push(`<span class="b b-odte">ODTE</span>`);
  else if(dte<=5) bs.push(`<span class="b b-dte">${dte}DTE</span>`);
  if(f.source==="v3") bs.push(`<span class="b b-v3">⚡</span>`);
  return bs.join("");
}

function flowCard(f,rm,isNew=false){
  const isCall=f.contract==="CALL";
  const prem=parsePrem(f.premium);
  const id=`fc-${makeFlowId(f).replace(/[^a-z0-9]/gi,"_")}`;
  return `<div class="fc ${isCall?"call":"put"} ${isNew?"new-flash":""}" id="${id}">
    <div class="fc-main" onclick="toggleExpand('${id}')">
      <div class="fdot ${isCall?"call":"put"}"></div>
      <div>
        <div class="ftop"><span class="fct ${isCall?"call":"put"}">${f.contract}</span><span class="fdet">$${f.strike} · ${f.expiry}</span></div>
        <div class="fsub">Size: ${f.size} · Vol: ${f.volume||"—"} · OI: ${f.oi||"—"}${f.iv?` · IV: ${f.iv}`:""}</div>
        <div class="badges">${flowBadges(f,rm)}</div>
      </div>
      <div class="fr"><div class="fp ${prem>=1e6?"lg":""}">${f.premium}</div><div class="ftime">${f.time} <span class="expand-icon" id="ei-${id}">▾</span></div></div>
    </div>
    <div class="fc-detail" id="det-${id}">
      <div><div class="d-label">Ticker</div><div class="d-val">${f.ticker}</div></div>
      <div><div class="d-label">Contract</div><div class="d-val" style="color:${isCall?"var(--green)":"var(--red)"}">${f.contract}</div></div>
      <div><div class="d-label">Strike</div><div class="d-val">$${f.strike}</div></div>
      <div><div class="d-label">Expiry</div><div class="d-val">${f.expiry}</div></div>
      <div><div class="d-label">Premium</div><div class="d-val" style="color:${prem>=1e6?"var(--amber)":"var(--text)"}">${f.premium}</div></div>
      <div><div class="d-label">Size</div><div class="d-val">${f.size}</div></div>
      <div><div class="d-label">Volume</div><div class="d-val">${f.volume||"—"}</div></div>
      <div><div class="d-label">Open Interest</div><div class="d-val">${f.oi||"—"}</div></div>
      <div><div class="d-label">Sentiment</div><div class="d-val" style="color:${f.sentiment==="BULLISH"?"var(--green)":"var(--red)"}">${f.sentiment}</div></div>
      ${f.iv?`<div><div class="d-label">IV</div><div class="d-val">${f.iv}</div></div>`:""}
      ${f.spot?`<div><div class="d-label">Spot</div><div class="d-val">${f.spot}</div></div>`:""}
      ${f.exchange?`<div><div class="d-label">Exchange</div><div class="d-val">${f.exchange}</div></div>`:""}
      ${f.tradeType?`<div><div class="d-label">Type</div><div class="d-val">${f.tradeType}</div></div>`:""}
      ${f.moneyType?`<div><div class="d-label">Moneyness</div><div class="d-val">${f.moneyType}</div></div>`:""}
    </div>
  </div>`;
}

window.toggleExpand=function(id){ const det=document.getElementById(`det-${id}`); const ei=document.getElementById(`ei-${id}`); if(!det) return; det.classList.toggle("open"); if(ei) ei.classList.toggle("open"); };

function renderGrouped(filtered,rm){
  if(!filtered.length) return `<div class="empty">No flows match this filter</div>`;
  const sorted=sortFlows(filtered);
  if(selectedTicker!=="ALL") return `<div class="flows-list">${sorted.map(f=>flowCard(f,rm)).join("")}</div>`;
  const groups=new Map();
  sorted.forEach(f=>{ if(!groups.has(f.ticker)) groups.set(f.ticker,[]); groups.get(f.ticker).push(f); });
  const sortedG=[...groups.entries()].sort((a,b)=>b[1].reduce((s,f)=>s+parsePrem(f.premium),0)-a[1].reduce((s,f)=>s+parsePrem(f.premium),0));
  return sortedG.map(([ticker,tflows])=>{
    const prem=tflows.reduce((s,f)=>s+parsePrem(f.premium),0);
    return `<div class="tg"><div class="tghdr"><span class="tgn">${ticker}</span><span class="tgc">${tflows.length} flow${tflows.length!==1?"s":""}</span><span class="tgp">${fmtMoney(prem)}</span></div><div class="flows-list">${tflows.map(f=>flowCard(f,rm)).join("")}</div></div>`;
  }).join("");
}

function renderFeed(filtered,rm){
  if(!filtered.length) return `<div class="empty">No flows match this filter</div>`;
  const sorted=sortFlows(filtered);
  const rows=sorted.map(f=>{
    const isCall=f.contract==="CALL";
    const prem=parsePrem(f.premium);
    const id=`fr-${makeFlowId(f).replace(/[^a-z0-9]/gi,"_")}`;
    return `<tr class="feed-row" id="${id}">
      <td class="feed-muted">${f.time}</td>
      <td class="feed-ticker">${f.ticker}</td>
      <td class="${isCall?"feed-call":"feed-put"}">${f.contract}</td>
      <td class="feed-muted">$${f.strike}</td>
      <td class="feed-muted">${f.expiry}</td>
      <td class="feed-prem ${prem>=1e6?"lg":""}">${f.premium}</td>
      <td class="feed-muted">${f.size}</td>
      ${f.spot?`<td class="feed-muted">${f.spot}</td>`:`<td class="feed-muted">—</td>`}
      ${f.tradeType?`<td class="feed-muted">${f.tradeType}</td>`:`<td class="feed-muted">—</td>`}
      <td><div class="feed-badges">${flowBadges(f,rm)}</div></td>
    </tr>`;
  }).join("");
  const cols=[
    {label:"Time",    mode:"time"},
    {label:"Ticker",  mode:"ticker"},
    {label:"Type",    mode:null},
    {label:"Strike",  mode:null},
    {label:"Expiry",  mode:null},
    {label:"Premium", mode:"prem"},
    {label:"Size",    mode:"size"},
    {label:"Spot",    mode:null},
    {label:"Trade",   mode:null},
    {label:"Tags",    mode:null},
  ];
  const headers=cols.map(c=>{
    if(!c.mode) return `<th>${c.label}</th>`;
    const isAsc=sortMode===c.mode+"-asc", isDesc=sortMode===c.mode+"-desc"||sortMode===c.mode+"-desc"||(!isAsc&&sortMode.startsWith(c.mode));
    const cls=isAsc?"sort-asc":isDesc?"sort-desc":"";
    return `<th class="${cls}" onclick="colSort('${c.mode}')">${c.label}</th>`;
  }).join("");
  return `<table class="feed-table">
    <thead><tr>${headers}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

window.colSort=function(mode){
  if(sortMode===mode+"-desc") sortMode=mode+"-asc";
  else sortMode=mode+"-desc";
  renderAll();
};
function renderAll(){
  const rm=buildRepeatMap(allFlows);
  const src=getSourceFlows();
  const base=selectedTicker==="ALL"?src:src.filter(f=>f.ticker===selectedTicker);
  const filtered=applyFilter(base,activeFilter,rm);

  document.getElementById("panel-title").textContent=selectedTicker==="ALL"?"All Flows":selectedTicker;
  document.getElementById("panel-sub").textContent=`${filtered.length} flow${filtered.length!==1?"s":""} shown`;

  const allRm=buildRepeatMap(allFlows);
  document.getElementById("s-total").textContent=src.length;
  document.getElementById("s-calls").textContent=src.filter(f=>f.contract==="CALL").length;
  document.getElementById("s-puts").textContent=src.filter(f=>f.contract==="PUT").length;
  document.getElementById("s-repeats").textContent=new Set(src.filter(f=>(allRm.get(makeKey(f))||1)>=2).map(f=>makeKey(f))).size;
  document.getElementById("s-prem").textContent=fmtMoney(src.reduce((s,f)=>s+parsePrem(f.premium),0));

  document.getElementById("tab-count-all").textContent=allFlows.length;
  document.getElementById("tab-count-sweeps").textContent=allFlows.filter(f=>f.source!=="v3").length;
  document.getElementById("tab-count-v3").textContent=allFlows.filter(f=>f.source==="v3").length;

  renderSidebar();
  document.getElementById("flows-container").innerHTML=viewMode==="feed"?renderFeed(filtered,rm):renderGrouped(filtered,rm);
  updateCharts();
}

// source tabs
document.querySelectorAll(".src-tab").forEach(btn=>{
  btn.addEventListener("click",()=>{
    activeSource=btn.dataset.source;
    selectedTicker="ALL";
    document.querySelectorAll(".src-tab").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    renderAll();
  });
});

// view toggle
document.getElementById("vt-grouped").addEventListener("click",()=>{ viewMode="grouped"; document.getElementById("vt-grouped").classList.add("active"); document.getElementById("vt-feed").classList.remove("active"); renderAll(); });
document.getElementById("vt-feed").addEventListener("click",()=>{ viewMode="feed"; document.getElementById("vt-feed").classList.add("active"); document.getElementById("vt-grouped").classList.remove("active"); renderAll(); });

// filters
document.querySelectorAll(".pill").forEach(btn=>{
  btn.addEventListener("click",()=>{
    activeFilter=btn.dataset.filter;
    document.querySelectorAll(".pill").forEach(b=>b.classList.remove("active","g","r","a"));
    btn.classList.add("active");
    if(activeFilter==="call"||activeFilter==="bullish") btn.classList.add("g");
    if(activeFilter==="put"||activeFilter==="bearish")  btn.classList.add("r");
    if(activeFilter==="repeat"||activeFilter==="odte"||activeFilter==="shortterm") btn.classList.add("a");
    renderAll();
  });
});
document.getElementById("sort-sel").addEventListener("change",e=>{ sortMode=e.target.value; renderAll(); });

async function refresh(){
  const flows=await fetchFlows();
  if(!flows){ document.getElementById("last-refresh").textContent="⚠ Failed"; return; }
  const newFlows=flows.filter(f=>!knownIds.has(makeFlowId(f)));
  newFlows.forEach(f=>{ knownIds.add(makeFlowId(f)); showToast(f); playAlert(); });
  allFlows=flows;
  renderAll();
  newFlows.forEach(f=>{ const id=`fc-${makeFlowId(f).replace(/[^a-z0-9]/gi,"_")}`; const el=document.getElementById(id); if(el){ el.classList.remove("new-flash"); void el.offsetWidth; el.classList.add("new-flash"); } });
  const t=new Date().toLocaleTimeString("en-US",{timeZone:"America/New_York",hour:"2-digit",minute:"2-digit"});
  document.getElementById("last-refresh").textContent=`Updated ${t} ET`;
}

function showDashboard(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("dashboard").style.display="flex";
  initCharts();
  refresh();
  setInterval(refresh,REFRESH_INTERVAL);
}
</script>
</body>
